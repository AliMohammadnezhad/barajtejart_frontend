# /etc/nginx/sites-available/barajtejarat
# Reverse proxy for the Next.js app running on 127.0.0.1:3000 (PM2).

# gzip — safe to declare here (http-level defaults are conservative)
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 5;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml font/woff2;

server {
    listen 80;
    listen [::]:80;

    # No domain yet — answer on the bare IP / any host.
    # When you get a domain, replace with:  server_name example.com www.example.com;
    server_name _;

    # ── security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 10m;

    # ── immutable Next.js build assets: cache hard at the edge/browser ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── static files from /public (images, fonts) ──
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── everything else → Next.js ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # ── SSL placeholder ──────────────────────────────────────────
    # Once a domain points at this server, run:
    #   sudo apt install -y certbot python3-certbot-nginx
    #   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
    # certbot rewrites this file with listen 443 ssl + redirect.
    # ─────────────────────────────────────────────────────────────
}
